spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/dispatch_system?useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate: {}

server:
  port: 8080

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:dako-emergency-default-dev-secret-key-min-32-chars}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}

  # Dispatch radius configuration (km)
  dispatch:
    radius:
      medical: 10
      fire: 50
      police: 10
      emergency-car: 1
      general: 10
    offer-timeout-seconds: 20
    batch-size: 3
